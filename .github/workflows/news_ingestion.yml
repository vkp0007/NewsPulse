name: News Ingestion

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: production   # <-- Use your actual environment name

    steps:
      - name: Trigger News Ingestion
        run: |
          curl -X POST \
            -H "x-api-key: ${{ secrets.INGEST_API_KEY }}" \
            "https://newspulse-wfr4.onrender.com/ingest"